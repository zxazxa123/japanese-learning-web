<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>從零開始學日文 — 互動學習平台</title>
  <style>
    :root {
      --bg: #0f0f14;
      --surface: #18181f;
      --surface2: #22222c;
      --border: #2e2e3a;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --accent: #e63946;
      --accent2: #457b9d;
      --green: #2a9d8f;
      --yellow: #f4a261;
      --purple: #9b5de5;
      --radius: 12px;
      --font: 'Segoe UI', system-ui, sans-serif;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --card-height: 280px;
      --card-radius: 16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      overflow-x: hidden;
      padding-bottom: calc(70px + var(--safe-bottom));
    }
    .hero {
      text-align: center;
      padding: 60px 20px 40px;
      background: linear-gradient(180deg, #1a1a2e 0%, var(--bg) 100%);
    }
    .hero h1 {
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 12px;
    }
    .hero h1 span { color: var(--accent); }
    .hero p { color: var(--muted); font-size: 1.1rem; max-width: 500px; margin: 0 auto 30px; }
    .progress-bar {
      max-width: 480px;
      margin: 0 auto;
      background: var(--surface);
      border-radius: 999px;
      height: 8px;
      overflow: hidden;
    }
    .progress-bar span {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--purple));
      width: 0%;
      transition: width 0.6s ease;
      border-radius: 999px;
    }
    .progress-label {
      margin-top: 10px;
      font-size: 0.85rem;
      color: var(--muted);
    }

    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(15,15,20,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    nav::-webkit-scrollbar { display: none; }
    nav ul {
      display: flex;
      list-style: none;
      padding: 0 16px;
      gap: 4px;
    }
    nav li { flex-shrink: 0; }
    nav button {
      display: block;
      padding: 14px 16px;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 0.95rem;
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.2s;
      font-family: inherit;
    }
    nav button:hover { color: var(--text); background: var(--surface); }
    nav button.active {
      color: var(--accent);
      background: rgba(230,57,70,0.1);
    }

    /* ── 底部導航 ── */
    .top-nav { display: block; }
    .bottom-nav {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: calc(60px + var(--safe-bottom));
      padding-bottom: var(--safe-bottom);
      background: var(--surface);
      border-top: 1px solid var(--border);
      z-index: 1000;
      flex-direction: row;
      justify-content: space-around;
      align-items: center;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .bottom-nav button {
      flex: 1;
      min-width: 44px;
      min-height: 50px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 0.7rem;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }
    .bottom-nav button span:first-child {
      font-size: 1.3rem;
      line-height: 1;
    }
    .bottom-nav button.active { color: var(--accent); }
    .bottom-nav button:active { transform: scale(0.92); }

    @media (max-width: 600px) {
      .top-nav { display: none; }
      .bottom-nav { display: flex; }
    }

    main { max-width: 800px; margin: 0 auto; padding: 32px 16px 100px; }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* ── 五十音卡片 ── */
    .kana-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
      gap: 10px;
      margin-bottom: 28px;
    }
    .kana-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 8px;
      text-align: center;
      cursor: pointer;
      transition: all 0.15s;
      position: relative;
    }
    .kana-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .kana-card .big { font-size: 2rem; font-weight: 700; line-height: 1.2; }
    .kana-card .romaji { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }
    .kana-card .type-badge {
      position: absolute;
      top: 6px; right: 6px;
      font-size: 0.6rem;
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 600;
    }
    .badge-h { background: rgba(230,57,70,0.2); color: var(--accent); }
    .badge-k { background: rgba(69,123,157,0.2); color: var(--accent2); }

    /* ── 詳情面板 ── */
    .detail-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      margin-bottom: 24px;
      display: none;
    }
    .detail-panel.visible { display: block; }
    .detail-panel .close-btn {
      float: right;
      background: var(--surface2);
      border: none;
      color: var(--muted);
      width: 32px; height: 32px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1.1rem;
    }
    .detail-main { font-size: 3.5rem; font-weight: 800; color: var(--accent); margin-bottom: 4px; }
    .detail-romaji { color: var(--muted); font-size: 1rem; margin-bottom: 20px; }
    .detail-row { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 16px; }
    .detail-example {
      background: var(--surface2);
      border-radius: 8px;
      padding: 12px 16px;
      flex: 1;
      min-width: 200px;
    }
    .detail-example .jp { font-size: 1.4rem; font-weight: 600; }
    .detail-example .tw { font-size: 0.8rem; color: var(--muted); margin-top: 4px; }

    .tab-toggle {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }
    .tab-toggle button {
      flex: 1;
      padding: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      cursor: pointer;
      font-family: inherit;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    .tab-toggle button.active {
      background: rgba(230,57,70,0.15);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── 文法章節 ── */
    .grammar-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 16px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .grammar-card:hover { border-color: var(--accent2); }
    .grammar-card h3 { font-size: 1.1rem; margin-bottom: 8px; }
    .grammar-card .pattern {
      font-size: 1.3rem;
      color: var(--yellow);
      margin-bottom: 8px;
    }
    .grammar-card .desc { color: var(--muted); font-size: 0.9rem; }
    .grammar-expand {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      display: none;
    }
    .grammar-card.expanded .grammar-expand { display: block; }
    .example-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .example-row:last-child { border-bottom: none; }
    .ex-ja { font-size: 1.2rem; font-weight: 600; min-width: 120px; }
    .ex-tw { color: var(--muted); font-size: 0.9rem; }
    .grammar-nav {
      display: flex;
      justify-content: space-between;
      margin-top: 24px;
    }
    .grammar-nav button {
      padding: 10px 20px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      cursor: pointer;
      font-family: inherit;
      font-size: 0.9rem;
    }
    .grammar-nav button:hover { border-color: var(--accent); }

    /* ── 單字卡 ── */
    .vocab-list { display: flex; flex-direction: column; gap: 8px; }
    .vocab-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .vocab-item:hover { border-color: var(--green); }
    .vocab-item .vw { font-size: 1.5rem; font-weight: 700; min-width: 80px; }
    .vocab-item .vrm { color: var(--muted); font-size: 0.85rem; min-width: 80px; }
    .vocab-item .vt { flex: 1; font-size: 0.9rem; color: var(--muted); }
    .vocab-item .vcheck {
      width: 24px; height: 24px;
      border-radius: 50%;
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      color: transparent;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .vocab-item.learned .vcheck {
      background: var(--green);
      border-color: var(--green);
      color: white;
    }
    .vocab-filter {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .vocab-filter button {
      padding: 6px 14px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      font-size: 0.85rem;
      font-family: inherit;
      transition: all 0.2s;
    }
    .vocab-filter button.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }
    .vocab-count {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 16px;
    }

    /* ── 測驗 ── */
    .quiz-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      text-align: center;
      margin-bottom: 20px;
    }
    .quiz-question {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .quiz-hint { color: var(--muted); font-size: 0.9rem; margin-bottom: 28px; }
    .quiz-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .quiz-opt {
      padding: 18px 16px;
      min-height: 60px;
      background: var(--surface2);
      border: 2px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 1.15rem;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .quiz-opt:hover { border-color: var(--accent2); }
    .quiz-opt.correct { border-color: var(--green); background: rgba(42,157,143,0.2); color: var(--green); }
    .quiz-opt.wrong { border-color: var(--accent); background: rgba(230,57,70,0.2); color: var(--accent); }
    .quiz-opt.show-correct { border-color: var(--green); background: rgba(42,157,143,0.1); color: var(--green); opacity: 0.7; }
    .quiz-score {
      font-size: 1.1rem;
      color: var(--muted);
      margin-top: 16px;
    }
    .quiz-score strong { color: var(--yellow); font-size: 1.4rem; }
    .quiz-next-btn {
      margin-top: 20px;
      padding: 12px 28px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 1rem;
      cursor: pointer;
      font-family: inherit;
      display: none;
    }

    /* ── 復習追蹤 ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      text-align: center;
    }
    .stat-card .num {
      font-size: 2.2rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .stat-card .label { color: var(--muted); font-size: 0.85rem; margin-top: 6px; }
    .streak-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 16px;
    }
    .streak-dot {
      width: 28px; height: 28px;
      border-radius: 6px;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      color: var(--muted);
    }
    .streak-dot.active { background: var(--green); color: white; }
    .streak-dot.today { border: 2px solid var(--accent); }

    .reset-btn {
      padding: 10px 20px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      cursor: pointer;
      font-family: inherit;
      font-size: 0.9rem;
    }
    .reset-btn:hover { border-color: var(--accent); color: var(--accent); }

    .fade-in { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 480px) {
      .quiz-options { grid-template-columns: 1fr; }
      .kana-grid { grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); }
    }

    /* ── 單字卡片模式 ── */
    .vocab-mode-toggle {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }
    .vocab-mode-toggle button {
      flex: 1;
      padding: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--muted);
      cursor: pointer;
      font-family: inherit;
      font-size: 0.95rem;
      transition: all 0.2s;
      min-height: 48px;
    }
    .vocab-mode-toggle button.active {
      background: rgba(230,57,70,0.15);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* 卡片容器 */
    .flashcard-container {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 10px 0;
    }
    .flashcard-container.active { display: flex; }

    /* 卡片本體 */
    .flashcard {
      width: 100%;
      max-width: 360px;
      height: var(--card-height);
      perspective: 1200px;
      cursor: pointer;
      touch-action: pan-y;
    }
    .flashcard-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      transform-style: preserve-3d;
    }
    .flashcard.flipped .flashcard-inner {
      transform: rotateY(180deg);
    }
    .flashcard-front,
    .flashcard-back {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--card-radius);
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      padding: 24px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .flashcard-back {
      transform: rotateY(180deg);
      background: linear-gradient(145deg, var(--surface), var(--surface2));
    }
    .flashcard-front .char {
      font-size: 4.5rem;
      font-weight: 800;
      color: var(--accent);
      line-height: 1.2;
    }
    .flashcard-front .hint {
      color: var(--muted);
      font-size: 0.85rem;
      margin-top: 20px;
    }
    .flashcard-back .romaji {
      font-size: 2rem;
      font-weight: 700;
      color: var(--accent2);
      margin-bottom: 8px;
    }
    .flashcard-back .meaning {
      font-size: 1.3rem;
      color: var(--text);
      text-align: center;
    }
    .flashcard-back .cat-tag {
      position: absolute;
      top: 16px;
      right: 16px;
      font-size: 0.7rem;
      padding: 4px 10px;
      border-radius: 999px;
      background: var(--surface2);
      color: var(--muted);
    }

    /* 滑動反饋 */
    .flashcard.swiping-left {
      transform: translateX(-40px) rotate(-4deg);
      opacity: 0.9;
      transition: none;
    }
    .flashcard.swiping-right {
      transform: translateX(40px) rotate(4deg);
      opacity: 0.9;
      transition: none;
    }

    /* 卡片導航 */
    .card-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      width: 100%;
      max-width: 360px;
    }
    .card-nav button {
      min-width: 48px;
      min-height: 48px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 50%;
      color: var(--text);
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .card-nav button:active {
      background: var(--surface);
      border-color: var(--accent);
    }
    .card-counter {
      font-size: 0.95rem;
      color: var(--muted);
      min-width: 80px;
      text-align: center;
    }

    /* 卡片動作按鈕 */
    .card-actions {
      display: flex;
      gap: 12px;
      width: 100%;
      max-width: 360px;
    }
    .card-actions button {
      flex: 1;
      min-height: 52px;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }
    .btn-fail {
      background: rgba(230, 57, 70, 0.15);
      color: var(--accent);
      border: 2px solid var(--accent);
    }
    .btn-fail:active { background: rgba(230, 57, 70, 0.3); }
    .btn-pass {
      background: rgba(42, 157, 143, 0.15);
      color: var(--green);
      border: 2px solid var(--green);
    }
    .btn-pass:active { background: rgba(42, 157, 143, 0.3); }

    /* 學習總結 */
    .session-summary {
      text-align: center;
      padding: 40px 20px;
    }
    .session-summary h2 {
      font-size: 1.8rem;
      margin-bottom: 20px;
      color: var(--accent);
    }
    .session-summary p {
      font-size: 1.1rem;
      color: var(--muted);
      margin-bottom: 12px;
    }
    .session-summary .stat {
      font-size: 2.5rem;
      font-weight: 800;
      color: var(--green);
    }
    .session-summary button {
      margin-top: 30px;
      padding: 14px 32px;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 1rem;
      cursor: pointer;
      font-family: inherit;
    }

    @media (min-width: 768px) {
      .flashcard { max-width: 440px; height: 320px; }
    }
  </style>
</head>
<body>

<div class="hero">
  <h1>🇯🇵 從零開始學<span>日文</span></h1>
  <p>互動式學習平台 — 五十音、文法、單字、測驗一手掌握</p>
  <div class="progress-bar"><span id="global-progress"></span></div>
  <p class="progress-label" id="progress-text">已學習 0 / 167 個假名</p>
</div>

<nav class="top-nav">
  <ul>
    <li><button class="active" data-tab="kana">五十音</button></li>
    <li><button data-tab="grammar">文法</button></li>
    <li><button data-tab="vocab">單字</button></li>
    <li><button data-tab="quiz">測驗</button></li>
    <li><button data-tab="stats">進度</button></li>
  </ul>
</nav>

<nav class="bottom-nav">
  <button class="active" data-tab="kana">
    <span>あ</span>
    <span>假名</span>
  </button>
  <button data-tab="grammar">
    <span>文</span>
    <span>文法</span>
  </button>
  <button data-tab="vocab">
    <span>単</span>
    <span>單字</span>
  </button>
  <button data-tab="quiz">
    <span>試</span>
    <span>測驗</span>
  </button>
  <button data-tab="stats">
    <span>計</span>
    <span>進度</span>
  </button>
</nav>

<main>

  <!-- ═══ 五十音 ═══ -->
  <div class="tab-content active" id="tab-kana">
    <div class="vocab-mode-toggle">
      <button id="kana-mode-list" class="active" onclick="setKanaMode('list')">📋 列表</button>
      <button id="kana-mode-card" onclick="setKanaMode('card')">🎴 卡片</button>
    </div>
    <div class="tab-toggle" id="kana-type-toggle">

let state = JSON.parse(localStorage.getItem('jp-learn') || '{}');
const save = () => localStorage.setItem('jp-learn', JSON.stringify(state));

function getLearned(setting) {
  return new Set(state[setting] || []);
}
function markLearned(setting, item) {
  if (!state[setting]) state[setting] = [];
  if (!state[setting].includes(item)) {
    state[setting].push(item);
    save();
  }
}

  });

    if (flashDeck.length === 0) initFlashDeck();

}

  const grid = document.getElementById('kana-grid');
  const data = currentKana === 'hira' ? HIRAGANA : KATAKANA;
  const learned = getLearned('kana');
  grid.innerHTML = data.map(([k, r]) => `
    <div class="kana-card fade-in" onclick="showDetail('${k}','${r}')">
      <span class="type-badge ${currentKana==='hira'?'badge-h':'badge-k'}">${currentKana==='hira'?'平':'片'}</span>
      <div class="big">${k}</div>
      <div class="romaji">${r}</div>

  `).join('');
  updateProgress();
}

  const panel = document.getElementById('detail-panel');
  panel.classList.add('visible');

  document.getElementById('detail-char').textContent = char;
  document.getElementById('detail-rm').textContent = romaji;
  const exs = EXAMPLES[char] || [['あります','有的'],['ありません','沒有的']];
  document.getElementById('detail-ex1-ja').textContent = exs[0][0];
  document.getElementById('detail-ex1-tw').textContent = exs[0][1];
  document.getElementById('detail-ex2-ja').textContent = exs[1][0];
  document.getElementById('detail-ex2-tw').textContent = exs[1][1];
  markLearned('kana', char);
  renderKana();
}

function updateProgress() {
  const learned = getLearned('kana').size;

}

function initKanaFlashDeck() {
  const data = currentKana === 'hira' ? HIRAGANA : KATAKANA;
  kanaFlashDeck = data.map(([k, r]) => ({ char: k, romaji: r }));
  kanaFlashIdx = 0;
  kanaFlashSession = { reviewed: 0, learned: 0, needsReview: 0 };
  renderKanaFlashCard();
}

function renderKanaFlashCard() {
  if (kanaFlashDeck.length === 0) return;
  const card = kanaFlashDeck[kanaFlashIdx];
  document.getElementById('kana-card-char').textContent = card.char;
  document.getElementById('kana-card-rm').textContent = card.romaji;
  document.getElementById('kana-card-hint').textContent = '羅馬拼音';
  document.getElementById('kana-card-type').textContent = currentKana === 'hira' ? '平假名' : '片假名';
  document.getElementById('kana-card-counter').textContent = `${kanaFlashIdx + 1} / ${kanaFlashDeck.length}`;

  const flashcard = document.getElementById('kana-flashcard');
  flashcard.classList.remove('flipped', 'swiping-left', 'swiping-right');
}

function flipKanaCard() {
  const flashcard = document.getElementById('kana-flashcard');
  flashcard.classList.toggle('flipped');
}

function onKanaTouchStart(e) {
  kanaTouchStartX = e.touches[0].clientX;
  kanaTouchStartY = e.touches[0].clientY;
  kanaIsSwiping = false;
}

function onKanaTouchMove(e) {
  if (!kanaTouchStartX) return;
  const dx = e.touches[0].clientX - kanaTouchStartX;
  const dy = e.touches[0].clientY - kanaTouchStartY;
  if (Math.abs(dx) > 10 && Math.abs(dx) > Math.abs(dy)) {
    kanaIsSwiping = true;
    const flashcard = document.getElementById('kana-flashcard');
    flashcard.classList.remove('swiping-left', 'swiping-right');
    flashcard.classList.add(dx < 0 ? 'swiping-left' : 'swiping-right');
  }
}

function onKanaTouchEnd(e) {
  if (!kanaIsSwiping) {
    kanaTouchStartX = 0;
    return;
  }
  const dx = e.changedTouches[0].clientX - kanaTouchStartX;
  const flashcard = document.getElementById('kana-flashcard');
  if (dx < -50) markKanaCard(0);
  else if (dx > 50) markKanaCard(1);
  flashcard.classList.remove('swiping-left', 'swiping-right');
  kanaTouchStartX = 0;
  kanaIsSwiping = false;
}

function markKanaCard(quality) {
  const item = kanaFlashDeck[kanaFlashIdx];
  if (quality === 1) {
    markLearned('kana', item.char);
    kanaFlashSession.learned++;
  } else {
    kanaFlashSession.needsReview++;
  }
  kanaFlashSession.reviewed++;

  const flashcard = document.getElementById('kana-flashcard');
  flashcard.style.transition = 'transform 0.3s, opacity 0.3s';
  flashcard.style.transform = quality === 1 ? 'translateX(120%) rotate(8deg)' : 'translateX(-120%) rotate(-8deg)';
  flashcard.style.opacity = '0';

  setTimeout(() => {
    kanaFlashIdx++;
    if (kanaFlashIdx >= kanaFlashDeck.length) {
      showKanaSessionSummary();
    } else {
      flashcard.style.transition = 'none';
      flashcard.style.transform = '';
      flashcard.style.opacity = '';
      renderKanaFlashCard();
    }
  }, 300);
}

function nextKanaCard() {
  if (kanaFlashIdx < kanaFlashDeck.length - 1) {
    kanaFlashIdx++;
    const flashcard = document.getElementById('kana-flashcard');
    flashcard.classList.remove('flipped');
    flashcard.style.transition = 'transform 0.3s';
    flashcard.style.transform = 'translateX(-120%)';
    flashcard.style.opacity = '0';
    setTimeout(() => {
      flashcard.style.transition = 'none';
      flashcard.style.transform = '';
      flashcard.style.opacity = '';
      renderKanaFlashCard();
    }, 200);
  }
}

function prevKanaCard() {
  if (kanaFlashIdx > 0) {
    kanaFlashIdx--;
    const flashcard = document.getElementById('kana-flashcard');
    flashcard.classList.remove('flipped');
    flashcard.style.transition = 'transform 0.3s';
    flashcard.style.transform = 'translateX(120%)';
    flashcard.style.opacity = '0';
    setTimeout(() => {
      flashcard.style.transition = 'none';
      flashcard.style.transform = '';
      flashcard.style.opacity = '';
      renderKanaFlashCard();
    }, 200);
  }
}

function showKanaSessionSummary() {
  const container = document.getElementById('kana-flashcard-container');
  const { learned, needsReview, reviewed } = kanaFlashSession;
  container.innerHTML = `
    <div class="session-summary">
      <h2>學習完成！</h2>
      <p>學習了 <span class="stat">${learned}</span> 個假名</p>
      <p>需要複習 <span class="stat" style="color:var(--accent)">${needsReview}</span> 個</p>
      <p>總計 ${reviewed} 個</p>
      <button onclick="exitKanaCardMode()">返回繼續學習</button>
    </div>
  `;
}

function exitKanaCardMode() {
  setKanaMode('list');
  kanaFlashDeck = [];
  kanaFlashIdx = 0;
  document.getElementById('kana-flashcard-container').innerHTML = `
      <div class="flashcard" id="kana-flashcard" ontouchstart="onKanaTouchStart(event)" ontouchmove="onKanaTouchMove(event)" ontouchend="onKanaTouchEnd(event)" onclick="flipKanaCard()">
        <div class="flashcard-inner">
          <div class="flashcard-front">
            <div class="char" id="kana-card-char"></div>
            <div class="hint">點擊翻開</div>
          </div>
          <div class="flashcard-back">
            <div class="cat-tag" id="kana-card-type"></div>
            <div class="romaji" id="kana-card-rm"></div>
            <div class="meaning" id="kana-card-hint"></div>
          </div>
        </div>
      </div>
      <div class="card-nav">
        <button onclick="prevKanaCard()">←</button>
        <span class="card-counter" id="kana-card-counter">1 / 103</span>
        <button onclick="nextKanaCard()">→</button>
      </div>
      <div class="card-actions">
        <button class="btn-fail" onclick="markKanaCard(0)">不會</button>
        <button class="btn-pass" onclick="markKanaCard(1)">認識</button>
      </div>
  `;
  initKanaFlashDeck();
}

let grammarPage = 0;
const PER_PAGE = 4;

function renderGrammar() {
  const list = document.getElementById('grammar-list');
  const start = grammarPage * PER_PAGE;
  const items = GRAMMAR.slice(start, start + PER_PAGE);
  list.innerHTML = items.map((g, i) => `
    <div class="grammar-card" id="gc-${start+i}">
      <h3>${g.title}</h3>
      <div class="pattern">${g.pattern}</div>
      <div class="desc">${g.desc}</div>
      <div class="grammar-expand">
        ${g.examples.map(([ja,tw])=>`<div class="example-row"><span class="ex-ja">${ja}</span><span class="ex-tw">${tw}</span></div>`).join('')}
      </div>
    </div>
  `).join('');
  document.querySelectorAll('.grammar-card').forEach(card => {
    card.addEventListener('click', () => card.classList.toggle('expanded'));
  });
  document.getElementById('grammar-nav').style.display = start + PER_PAGE < GRAMMAR.length ? 'flex' : 'none';
}

document.getElementById('grammar-list').addEventListener('click', e => {
  if (e.target.closest('.grammar-card')) {
    e.target.closest('.grammar-card').classList.toggle('expanded');
  }
});

let vocabCat = 'all';
const VOCAB_CATS = [
  {id:'all', label:'全部'},
  {id:'basic', label:'基礎'},
  {id:'time', label:'時間'},
  {id:'food', label:'飲食'},
  {id:'daily', label:'日常'},
  {id:'animal', label:'動物'},
  {id:'adj', label:'形容詞'},
  {id:'verb', label:'動詞'},
  {id:'place', label:'場所'},
  {id:'number', label:'數字'},
];

function renderVocab() {
  const filter = document.getElementById('vocab-filter');
  filter.innerHTML = VOCAB_CATS.map(c => `
    <button class="${vocabCat===c.id?'active':''}" onclick="vocabCat='${c.id}';renderVocab();if(vocabMode==='card')initFlashDeck()">${c.label}</button>
  `).join('');
  const filtered = vocabCat === 'all' ? VOCAB : VOCAB.filter(v => v.cat === vocabCat);
  const learned = getLearned('vocab');
  document.getElementById('vocab-count').textContent = `共 ${filtered.length} 個單字，已學習 ${learned.size} 個`;
  document.getElementById('vocab-list').innerHTML = filtered.map(v => `
    <div class="vocab-item ${learned.has(v.ja)?'learned':''}" onclick="toggleVocab('${v.ja}')">
      <span class="vw">${v.ja}</span>
      <span class="vrm">${v.rm}</span>
      <span class="vt">${v.tw}</span>
      <span class="vcheck">✓</span>
    </div>
  `).join('');

  if (vocabMode === 'card') {
    initFlashDeck();
  }
}

function toggleVocab(word) {
  const learned = getLearned('vocab');
  if (learned.has(word)) {
    state.vocab = state.vocab.filter(w => w !== word);
  } else {
    markLearned('vocab', word);
  }
  renderVocab();
  updateStats();
}

// ═══════════════════════════════════════════
// 測驗
// ═══════════════════════════════════════════
const QUIZ_TYPES = ['kana-read', 'vocab-ja', 'vocab-tw'];
let quizType = 'kana-read';
let quizData = [];
let quizIdx = 0;
let quizCorrect = 0;
let quizDone = false;

function buildQuizSet() {
  const learned = [...getLearned('kana')];
  const vocabL = [...getLearned('vocab')];
  const pool = [];

  if (learned.length >= 4) {
    for (const k of learned) {
      const romaji = (HIRAGANA.find(h=>h[0]===k)||KATAKANA.find(kk=>kk[0]===k)||[])[1]||'';
      const wrong = learned.filter(x=>x!==k).sort(()=>Math.random()-0.5).slice(0,3);
      pool.push({
        q: k, a: romaji,
        opts: [romaji, ...wrong.map(w=>(HIRAGANA.find(h=>h[0]===w)||KATAKANA.find(kk=>kk[0]===w)||[])[1]||'')].sort(()=>Math.random()-0.5),
        hint: '這個假名怎麼讀？'
      });
    }
  }

  if (vocabL.length >= 2) {
    for (const v of VOCAB.filter(x=>vocabL.includes(x.ja))) {
      const wrong = VOCAB.filter(x=>x.ja!==v.ja && x.cat===v.cat).slice(0,3);
      pool.push({
        q: v.ja, a: v.tw,
        opts: [v.tw, ...wrong.map(w=>w.tw), '其他'].slice(0,4).sort(()=>Math.random()-0.5),
        hint: `"${v.ja}" 是什麼意思？`
      });
    }
  }

  return pool.length >= 4 ? pool.sort(()=>Math.random()-0.5) : null;
}

function startQuiz() {
  quizData = buildQuizSet();
  if (!quizData) {
    document.getElementById('quiz-q').textContent = '📖 先學習一些內容再來挑戰！';
    document.getElementById('quiz-hint').textContent = '請先在「五十音」或「單字」頁面學習至少4項';
    document.getElementById('quiz-options').innerHTML = '';
    document.getElementById('quiz-score').textContent = '';
    document.getElementById('quiz-next-btn').style.display = 'none';
    return;
  }
  quizIdx = 0;
  quizCorrect = 0;
  quizDone = false;
  document.getElementById('quiz-score').textContent = '';
  renderQuiz();
}

function renderQuiz() {
  const q = quizData[quizIdx];
  document.getElementById('quiz-q').textContent = q.q;
  document.getElementById('quiz-hint').textContent = q.hint;
  document.getElementById('quiz-options').innerHTML = q.opts.map(o => `
    <button class="quiz-opt" onclick="checkQuiz(this,'${q.a}','${o}')">${o}</button>
  `).join('');
  document.getElementById('quiz-next-btn').style.display = 'none';
}

function checkQuiz(btn, correct, selected) {
  const opts = document.querySelectorAll('.quiz-opt');
  opts.forEach(o => o.style.pointerEvents = 'none');
  if (selected === correct) {
    btn.classList.add('correct');
    quizCorrect++;
    state.quizCorrect = (state.quizCorrect || 0) + 1;
    save();
  } else {
    btn.classList.add('wrong');
    opts.forEach(o => { if (o.textContent === correct) o.classList.add('correct'); });
  }
  document.getElementById('quiz-score').innerHTML = `<strong>${quizIdx+1}</strong> / ${quizData.length}`;
  document.getElementById('quiz-next-btn').style.display = 'inline-block';
  quizDone = true;
}

function nextQuiz() {
  quizIdx++;
  if (quizIdx >= quizData.length) {
    const pct = Math.round(quizCorrect / quizData.length * 100);
    document.getElementById('quiz-q').textContent = pct >= 80 ? '🎉 太棒了！' : pct >= 50 ? '💪 不錯喔！' : '📚 繼續加油！';
    document.getElementById('quiz-hint').textContent = `正確率 ${quizCorrect}/${quizData.length} = ${pct}%`;
    document.getElementById('quiz-options').innerHTML = '';
    document.getElementById('quiz-score').innerHTML = `<strong>${quizCorrect}</strong> 題答對`;
    document.getElementById('quiz-next-btn').textContent = '再玩一次 🔄';
    document.getElementById('quiz-next-btn').onclick = startQuiz;
    document.getElementById('quiz-next-btn').style.display = 'inline-block';
  } else {
    renderQuiz();
  }
}

function updateStats() {
  const kl = getLearned('kana').size;
  const vl = getLearned('vocab').size;
  const qc = state.quizCorrect || 0;
  const streak = state.streak || 0;
  document.getElementById('stat-kana').textContent = kl;
  document.getElementById('stat-vocab').textContent = vl;
  document.getElementById('stat-correct').textContent = qc;
  document.getElementById('stat-streak').textContent = streak;

  const row = document.getElementById('streak-row');
  const days = ['一','二','三','四','五','六','日'];
  const today = new Date().getDay();
  const todayIdx = (today + 6) % 7;
  row.innerHTML = [0,1,2,3,4,5,6].map(d => {
    const isToday = d === 6;
    const isActive = isToday && kl > 0;
    return `<div class="streak-dot ${isActive?'active':''} ${isToday?'today':''}">${days[(todayIdx - 6 + d + 7) % 7]}</div>`;
  }).join('');

  const pct = Math.round(kl / HIRAGANA.length * 100);
  document.getElementById('global-progress').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `已學習 ${kl} / ${HIRAGANA.length} 個假名`;
}

function resetProgress() {
  if (confirm('確定要重置所有學習進度嗎？')) {
    localStorage.removeItem('jp-learn');
    state = {};
    updateStats();
    renderKana();
    renderVocab();
  }
}

// 單字卡片模式
// ═══════════════════════════════════════════
let vocabMode = 'list';
let flashDeck = [];
let flashIdx = 0;
let flashSession = { reviewed: 0, learned: 0, needsReview: 0 };
let touchStartX = 0;
let touchStartY = 0;
let isSwiping = false;

function setVocabMode(mode) {
  vocabMode = mode;
  document.getElementById('mode-list').classList.toggle('active', mode === 'list');
  document.getElementById('mode-card').classList.toggle('active', mode === 'card');
  document.getElementById('vocab-list').style.display = mode === 'list' ? 'flex' : 'none';
  document.getElementById('flashcard-container').classList.toggle('active', mode === 'card');

  if (mode === 'card' && flashDeck.length === 0) {
    initFlashDeck();
  }
}

function initFlashDeck() {
  const vocabFilter = document.getElementById('vocab-filter');
  const catButtons = vocabFilter.querySelectorAll('button');
  let activeCat = 'all';
  catButtons.forEach(btn => {
    if (btn.classList.contains('active') && btn.onclick.toString().includes('vocabCat')) {
      // extract cat from onclick
    }
  });

  const filtered = vocabCat === 'all' ? VOCAB : VOCAB.filter(v => v.cat === vocabCat);
  flashDeck = filtered;
  flashIdx = 0;
  flashSession = { reviewed: 0, learned: 0, needsReview: 0 };
  renderFlashCard();
}

function renderFlashCard() {
  if (flashDeck.length === 0) {
    document.getElementById('card-char').textContent = '📖';
    document.getElementById('card-rm').textContent = '沒有單字';
    document.getElementById('card-tw').textContent = '切換分類或新增單字';
    document.getElementById('card-cat').textContent = '';
    return;
  }

  const card = flashDeck[flashIdx];
  document.getElementById('card-char').textContent = card.ja;
  document.getElementById('card-rm').textContent = card.rm;
  document.getElementById('card-tw').textContent = card.tw;
  document.getElementById('card-cat').textContent = card.cat;

  const catLabels = { basic:'基礎', time:'時間', food:'飲食', daily:'日常', animal:'動物', adj:'形容詞', verb:'動詞', place:'場所', number:'數字' };
  document.getElementById('card-cat').textContent = catLabels[card.cat] || card.cat;

  document.getElementById('card-counter').textContent = `${flashIdx + 1} / ${flashDeck.length}`;

  const flashcard = document.getElementById('flashcard');
  flashcard.classList.remove('flipped', 'swiping-left', 'swiping-right');
}

function flipCard() {
  const flashcard = document.getElementById('flashcard');
  flashcard.classList.toggle('flipped');
}

function onCardTouchStart(e) {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  isSwiping = false;
}

function onCardTouchMove(e) {
  if (!touchStartX) return;
  const dx = e.touches[0].clientX - touchStartX;
  const dy = e.touches[0].clientY - touchStartY;

  if (Math.abs(dx) > 10 && Math.abs(dx) > Math.abs(dy)) {
    isSwiping = true;
    const flashcard = document.getElementById('flashcard');
    flashcard.classList.remove('swiping-left', 'swiping-right');
    if (dx < 0) {
      flashcard.classList.add('swiping-left');
    } else {
      flashcard.classList.add('swiping-right');
    }
  }
}

function onCardTouchEnd(e) {
  if (!isSwiping) {
    touchStartX = 0;
    return;
  }

  const dx = e.changedTouches[0].clientX - touchStartX;
  const flashcard = document.getElementById('flashcard');

  if (dx < -50) {
    markCard(0);
  } else if (dx > 50) {
    markCard(1);
  }

  flashcard.classList.remove('swiping-left', 'swiping-right');
  touchStartX = 0;
  isSwiping = false;
}

function markCard(quality) {
  const word = flashDeck[flashIdx];
  if (quality === 1) {
    markLearned('vocab', word.ja);
    flashSession.learned++;
  } else {
    flashSession.needsReview++;
  }
  flashSession.reviewed++;

  const flashcard = document.getElementById('flashcard');
  flashcard.style.transition = 'transform 0.3s, opacity 0.3s';
  flashcard.style.transform = quality === 1 ? 'translateX(120%) rotate(8deg)' : 'translateX(-120%) rotate(-8deg)';
  flashcard.style.opacity = '0';

  setTimeout(() => {
    flashIdx++;
    if (flashIdx >= flashDeck.length) {
      showSessionSummary();
    } else {
      flashcard.style.transition = 'none';
      flashcard.style.transform = '';
      flashcard.style.opacity = '';
      renderFlashCard();
    }
  }, 300);
}

function nextCard() {
  if (flashIdx < flashDeck.length - 1) {
    flashIdx++;
    const flashcard = document.getElementById('flashcard');
    flashcard.classList.remove('flipped');
    flashcard.style.transition = 'transform 0.3s';
    flashcard.style.transform = 'translateX(-120%)';
    flashcard.style.opacity = '0';
    setTimeout(() => {
      flashcard.style.transition = 'none';
      flashcard.style.transform = '';
      flashcard.style.opacity = '';
      renderFlashCard();
    }, 200);
  }
}

function prevCard() {
  if (flashIdx > 0) {
    flashIdx--;
    const flashcard = document.getElementById('flashcard');
    flashcard.classList.remove('flipped');
    flashcard.style.transition = 'transform 0.3s';
    flashcard.style.transform = 'translateX(120%)';
    flashcard.style.opacity = '0';
    setTimeout(() => {
      flashcard.style.transition = 'none';
      flashcard.style.transform = '';
      flashcard.style.opacity = '';
      renderFlashCard();
    }, 200);
  }
}

function showSessionSummary() {
  const container = document.getElementById('flashcard-container');
  const learned = flashSession.learned;
  const needsReview = flashSession.needsReview;
  const total = flashSession.reviewed;
  container.innerHTML = `
    <div class="session-summary">
      <h2>學習完成！</h2>
      <p>學習了 <span class="stat">${learned}</span> 個單字</p>
      <p>需要複習 <span class="stat" style="color:var(--accent)">${needsReview}</span> 個</p>
      <p>總計 ${total} 個</p>
      <button onclick="exitCardMode()">返回繼續學習</button>
    </div>
  `;
}

function exitCardMode() {
  setVocabMode('list');
  flashDeck = [];
  flashIdx = 0;
  document.getElementById('flashcard-container').innerHTML = `
      <div class="flashcard" id="flashcard" ontouchstart="onCardTouchStart(event)" ontouchmove="onCardTouchMove(event)" ontouchend="onCardTouchEnd(event)" onclick="flipCard()">
        <div class="flashcard-inner">
          <div class="flashcard-front">
            <div class="char" id="card-char"></div>
            <div class="hint">點擊翻開</div>
          </div>
          <div class="flashcard-back">
            <div class="cat-tag" id="card-cat"></div>
            <div class="romaji" id="card-rm"></div>
            <div class="meaning" id="card-tw"></div>
          </div>
        </div>
      </div>
      <div class="card-nav">
        <button onclick="prevCard()">←</button>
        <span class="card-counter" id="card-counter">1 / 20</span>
        <button onclick="nextCard()">→</button>
      </div>
      <div class="card-actions">
        <button class="btn-fail" onclick="markCard(0)">不會</button>
        <button class="btn-pass" onclick="markCard(1)">認識</button>
      </div>
  `;
  initFlashDeck();
}
